name: Test

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test:
    name: Run tests
    strategy:
      fail-fast: false
      matrix:
        # https://github.com/actions/go-versions/blob/main/versions-manifest.json
        go-version: [1.25.x, 1.26.x]
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          stable: false
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Run tests
        run: make test
        env:
          BOT_GITHUB_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  test-extended:
    name: Run race+coverage tests
    runs-on: "ubuntu-latest"
    steps:
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Build binary
        run: make build/slack-bot
      - name: Run tests with race
        run: make test-race
        env:
          BOT_GITHUB_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Test with coverage
        run: make test-coverage
        env:
          BOT_GITHUB_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Coverage
        uses: codecov/codecov-action@v6
      - name: Build examples
        run: cd examples/custom_commands && make
  lint:
    name: Lint
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # golangci-lint works per module: lint every go.work workspace module
        module: [".", "cmd/bot", "cmd/cli", "plugins/aws", "plugins/example", "plugins/ripeatlas"]
    steps:
      - uses: actions/checkout@v6
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9.2.1
        with:
          only-new-issues: true
          working-directory: ${{ matrix.module }}
          args: --timeout=3m
  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          # use the full import path pattern to cover all go.work workspace modules
          args: -exclude=G404,G307,G104,G117,G705,G706 github.com/innogames/slack-bot/v2/...
      - id: govulncheck
        uses: golang/govulncheck-action@v1
        with:
          repo-checkout: false
          go-package: github.com/innogames/slack-bot/v2/...
  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0
      - name: Build and push
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          load: true
