version: "2"
run:
  # make path based excludes work when linting the workspace modules (cmd/*, plugins/*)
  relative-path-mode: cfg
linters:
  enable:
    - asasalint
    - asciicheck
    - bodyclose
    - copyloopvar
    - dogsled
    - dupl
    - errname
    - errorlint
    - exhaustive
    - fatcontext
    - gocheckcompilerdirectives
    - gochecknoinits
    - gocritic
    - gocyclo
    - goprintffuncname
    - gosec
    - importas
    - intrange
    - loggercheck
    - makezero
    - mirror
    - misspell
    - musttag
    - nakedret
    - nilerr
    - noctx
    - nolintlint
    - perfsprint
    - prealloc
    - predeclared
    - revive
    - rowserrcheck
    - staticcheck
    - tagalign
    - testifylint
    - thelper
    - unconvert
    - unparam
    - usestdlibvars
    - wastedassign
    - whitespace
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - perfsprint
          - usestdlibvars
          - noctx
        path: _test\.go
      - linters:
          - tagalign
        path: bot/config/
      - linters:
          - gochecknoinits
        path: plugins/
      # config structs intentionally hold secrets and are (de)serialized via mapstructure/yaml;
      # the field *names* matching a secret pattern is by design, not a leak.
      - linters:
          - gosec
        text: G117
      # musttag on debug/CLI dumps of config structs (mapstructure-tagged, yaml-dumped on purpose)
      - linters:
          - musttag
        path: (bot/config/|command/custom_commmands/|bot/tester/)
      # bot/tester is a CLI/test mock that prints to the terminal, not a real web server:
      # gosec taint analysis (XSS/log injection) does not apply.
      - linters:
          - gosec
        path: (bot/tester/|plugins/aws/)
        text: (G705|G706)
      # pre-existing package names; renaming would churn every importer for no real benefit.
      - linters:
          - revive
        path: (bot/util/|bot/version/|command/custom_commmands/|command/custom_variables/)
        text: 'var-naming.*package name'
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gci
    - gofumpt
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
